name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and Test
        run: |
          dotnet restore Kanban.slnx
          dotnet build Kanban.slnx --no-restore
          dotnet test KanbanApi.Tests/KanbanApi.Tests.csproj --no-build --verbosity normal

      - name: Publish
        run: dotnet publish KanbanApi.csproj -c Release -o ./publish

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'kanban-api-nurwell'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
