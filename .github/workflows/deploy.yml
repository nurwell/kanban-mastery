name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Kanban.slnx

      - name: Build and Test
        run: |
          dotnet build Kanban.slnx --no-restore
          dotnet test KanbanApi.Tests/KanbanApi.Tests.csproj --no-build --verbosity normal

      - name: Publish
        run: dotnet publish KanbanApi.csproj -c Release -o ./publish --no-restore

      - name: Zip publish output
        run: zip -r publish.zip ./publish

      - name: Deploy to Azure via Kudu
        env:
          KUDU_USER: ${{ secrets.KUDU_USERNAME }}
          KUDU_PASS: ${{ secrets.KUDU_PASSWORD }}
        run: |
          curl -X POST \
            --fail \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            --header "Content-Type: application/zip" \
            --data-binary @publish.zip \
            "https://kanban-api-nurwell.scm.azurewebsites.net/api/zipdeploy"
